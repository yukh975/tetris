<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tetris</title>
    <style>
        :root, [data-theme="dark"] {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2e3147;
            --text: #e2e4ef;
            --muted: #8890b5;
            --accent: #58a6ff;
            --accent-hover: #79b8ff;
            --grid: #3a3f58;
            --kbd-bg: #2e3147;
            --overlay-bg: rgba(15, 17, 23, 0.55);
            --block-outline: rgba(0,0,0,0.4);
        }

        [data-theme="light"] {
            --bg: #e8eaf0;
            --surface: #ffffff;
            --border: #c0c4d0;
            --text: #1a1d2e;
            --muted: #6b7280;
            --accent: #2563eb;
            --accent-hover: #3b82f6;
            --grid: #d0d3de;
            --kbd-bg: #d0d4de;
            --overlay-bg: rgba(232, 234, 240, 0.65);
            --block-outline: rgba(0,0,0,0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-wrapper {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            transform-origin: center center;
            transform: scale(var(--scale, 1.3));
            transition: transform 0.15s ease;
        }

        .scale-control {
            position: fixed;
            bottom: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            z-index: 100;
            font-size: 12px;
            color: var(--muted);
        }

        .scale-control input[type="range"] {
            width: 100px;
            accent-color: var(--accent);
        }

        .scale-control span {
            min-width: 36px;
            text-align: center;
            color: var(--text);
            font-weight: 600;
        }

        .bottom-btn {
            position: fixed;
            bottom: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            z-index: 100;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            font-family: inherit;
        }

        .bottom-btn:hover { background: var(--border); }

        #lang-btn { left: 16px; }
        #theme-btn { left: 80px; }
        #grid-btn { left: 144px; }
        #rules-btn-bottom { left: 192px; }

        canvas#board {
            display: block;
            background: var(--surface);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 140px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .panel h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .panel .value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        canvas#next {
            display: block;
            margin: 0 auto;
        }

        .panel .value.small {
            font-size: 16px;
        }

        .panel .value.best {
            color: #f0a000;
        }

        .controls {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.8;
        }

        .controls kbd {
            background: var(--kbd-bg);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: inherit;
            color: var(--text);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--overlay-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            z-index: 10;
            pointer-events: auto;
        }

        .overlay.hidden { display: none; }

        .overlay h1 {
            font-size: 32px;
            color: var(--accent);
        }

        .overlay p {
            color: var(--muted);
            font-size: 14px;
        }

        .overlay .final-score {
            font-size: 20px;
            color: var(--text);
        }

        .btn {
            background: var(--accent);
            color: #ffffff;
            border: none;
            padding: 10px 28px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn:hover { background: var(--accent-hover); }

        .game-container {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 0 0 1px var(--grid);
        }

        /* Mobile touch controls */
        .touch-controls {
            display: none;
            gap: 6px;
            justify-content: center;
            padding: 2px 0;
            width: 100%;
        }

        .touch-btn {
            width: 64px;
            height: 64px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 50%;
            color: var(--text);
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }

        .touch-btn:active { background: var(--accent); color: #fff; transform: scale(0.92); }

        .touch-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding: 0 12px;
        }

        .mobile-pause-btn {
            display: none;
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 15;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text);
            font-size: 16px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-settings-row {
            display: none;
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 15;
            gap: 6px;
        }

        .mobile-settings-row .mini-btn {
            width: 30px;
            height: 30px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text);
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-top-bar {
            display: none;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 2px 4px;
            width: 100%;
        }

        .mobile-top-bar .mini-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px 8px;
            text-align: center;
            min-width: 50px;
        }

        .mobile-top-bar .mini-panel .label {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
        }

        .mobile-top-bar .mini-panel .val {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
        }

        .mobile-top-bar .mini-panel .val.best {
            color: #f0a000;
        }

        .mobile-next-wrap {
            display: none;
            justify-content: center;
            padding: 4px 0;
        }

        .swipe-hint { display: none; }

        @media (max-width: 700px), (pointer: coarse) {
            body {
                align-items: flex-start;
                padding-top: 4px;
                padding-bottom: env(safe-area-inset-bottom, 0px);
            }
            .game-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 4px;
                transform: none !important;
                width: 100%;
                max-width: 100vw;
                /* account for safe area at bottom */
                padding-bottom: env(safe-area-inset-bottom, 0px);
            }
            .game-container {
                /* height = dvh minus top bar(35) + controls(72) + safe area + gaps(16) */
                width: min(calc(100vw - 4px), calc((100dvh - 130px - env(safe-area-inset-bottom, 16px)) * 22 / 31));
                max-width: calc(100vw - 4px);
            }
            .game-container canvas#board {
                width: 100%;
                height: auto;
            }
            .sidebar { display: none; }
            .controls { display: none; }
            .mobile-top-bar { display: flex; }
            .touch-controls { display: flex; flex-direction: column; }
            .mobile-pause-btn { display: flex; }
            .mobile-settings-row { display: flex; }
            .scale-control { display: none; }
            .bottom-btn { display: none !important; }
        }

        .rules-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .rules-modal.visible { display: flex; }

        .rules-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px 28px;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
            color: var(--text);
            font-size: 13px;
            line-height: 1.7;
        }
        .rules-content h2 {
            color: var(--accent);
            font-size: 20px;
            margin-bottom: 12px;
        }
        .rules-content h3 {
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 14px 0 6px;
        }
        .rules-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 6px 0;
        }
        .rules-content td {
            padding: 3px 8px;
            border-bottom: 1px solid var(--border);
        }
        .rules-content td:last-child { text-align: right; }
        .rules-content .highlight {
            color: #f0a000;
            font-weight: 600;
        }
        .rules-close {
            display: block;
            margin: 16px auto 0;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <!-- Mobile: compact top stats -->
        <div class="mobile-top-bar">
            <div class="mini-panel"><div class="label" data-i18n="score">Очки</div><div class="val" id="m-score">0</div></div>
            <div class="mini-panel"><div class="label" data-i18n="level">Уровень</div><div class="val" id="m-level">1</div></div>
            <div class="mini-panel"><div class="label" data-i18n="lines_label">Линии</div><div class="val" id="m-lines">0</div></div>
            <div class="mini-panel"><div class="label" data-i18n="best_score">Лучший</div><div class="val best" id="m-best">-</div></div>
        </div>

        <div class="game-container">
            <canvas id="board"></canvas>
            <button class="mobile-pause-btn" id="m-pause-btn">⏸</button>
            <div class="mobile-settings-row">
                <div class="mini-btn" id="m-lang-btn">EN</div>
                <div class="mini-btn" id="m-theme-btn">☀️</div>
                <div class="mini-btn" id="m-grid-btn">▦</div>
                <div class="mini-btn" id="m-rules-btn" data-i18n="rules_btn">?</div>
            </div>
            <div id="overlay-start" class="overlay">
                <h1 data-i18n="title">Тетрис</h1>
                <p data-i18n="subtitle">Классическая игра</p>
                <button class="btn" id="btn-start" data-i18n="start">Начать игру</button>
            </div>
            <div id="overlay-pause" class="overlay hidden">
                <h1 data-i18n="paused">Пауза</h1>
                <button class="btn" id="btn-resume" data-i18n="resume">Продолжить</button>
            </div>
            <div id="overlay-gameover" class="overlay hidden">
                <h1 data-i18n="gameover">Игра окончена</h1>
                <p class="final-score" id="final-score"></p>
                <button class="btn" id="btn-restart" data-i18n="restart">Играть снова</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <h3 data-i18n="score">Очки</h3>
                <div class="value" id="score">0</div>
            </div>
            <div class="panel">
                <h3 data-i18n="level">Уровень</h3>
                <div class="value" id="level">1</div>
            </div>
            <div class="panel">
                <h3 data-i18n="lines_label">Линии</h3>
                <div class="value" id="lines">0</div>
            </div>
            <div class="panel">
                <h3 data-i18n="next">Следующая</h3>
                <canvas id="next" width="100" height="100"></canvas>
            </div>
            <div class="panel">
                <h3 data-i18n="last_score">Последний счёт</h3>
                <div class="value small" id="last-score">-</div>
            </div>
            <div class="panel">
                <h3 data-i18n="best_score">Лучший счёт</h3>
                <div class="value small best" id="best-score">-</div>
            </div>
            <div class="controls" id="controls-text">
                <kbd>&larr;</kbd> <kbd>&rarr;</kbd> <span data-i18n="move">Движение</span><br>
                <kbd>&uarr;</kbd> <span data-i18n="rotate">Поворот</span><br>
                <kbd>&darr;</kbd> <span data-i18n="soft_drop">Вниз</span><br>
                <kbd>Space</kbd> <span data-i18n="hard_drop">Бросить</span><br>
                <kbd>Esc</kbd> <kbd>P</kbd> <span data-i18n="pause">Пауза</span><br>
                <kbd>Enter</kbd> <span data-i18n="enter_start">Старт</span>
            </div>
        </div>

        <!-- Touch controls: 4 big round buttons -->
        <div class="touch-controls">
            <div class="touch-row">
                <div class="touch-btn" id="t-left">←</div>
                <div class="touch-btn" id="t-right">→</div>
                <div class="touch-btn" id="t-drop">↓</div>
                <div class="touch-btn" id="t-rotate">↻</div>
                <div class="touch-btn" id="t-hard">⏬</div>
            </div>
        </div>
    </div>

    <div class="scale-control">
        <span style="min-width:auto">-</span>
        <input type="range" id="scale-slider" min="0.5" max="2.5" step="0.05" value="1.3">
        <span style="min-width:auto">+</span>
        <span id="scale-value">130%</span>
        <button id="auto-scale-btn" title="Auto-fit" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--accent);cursor:pointer;font-size:14px;padding:2px 6px;margin-left:4px;">⤢</button>
    </div>

    <button class="bottom-btn" id="lang-btn">EN</button>
    <button class="bottom-btn" id="theme-btn">☀️</button>
    <button class="bottom-btn" id="grid-btn">▦</button>
    <button class="bottom-btn" id="rules-btn-bottom" data-i18n="rules_btn">?</button>

    <div class="rules-modal" id="rules-modal">
        <div class="rules-content" id="rules-content">
        </div>
    </div>

    <script src="tetris.min.js"></script>
</body>
</html>
